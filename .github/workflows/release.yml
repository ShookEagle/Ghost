name: Build & Release Ghost

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOTNET_VERSION: "8.0.x"
      PLUGIN_DLL_NAME: "Ghost.dll"
      ZIP_NAME: "Ghost.zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: |
          set -e
          CSPROJ="$(git ls-files '*.csproj' | head -n1)"
          echo "Using project: $CSPROJ"
          dotnet publish "$CSPROJ" -c Release -o out

      - name: Stage files for packaging
        run: |
          set -e
          CSPROJ="$(git ls-files '*.csproj' | head -n1)"
          PROJDIR="$(dirname "$CSPROJ")"

          mkdir -p dist/plugins/Ghost/lang

          cp "out/Ghost.dll" "dist/plugins/Ghost/"

          cp -f "$PROJDIR/lang/en.json" "dist/plugins/Ghost/lang/"

          echo "Staged files:"; find dist -maxdepth 3 -type f -print

      - name: Create zip
        working-directory: dist
        run: zip -r "${{ env.ZIP_NAME }}" plugins

      - name: Upload build artifact (for CI runs / debugging)
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-zip
          path: dist/${{ env.ZIP_NAME }}

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
          generate_release_notes: true